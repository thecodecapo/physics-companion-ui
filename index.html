<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Physics Companion</title>
<style>
:root {
  --blue:    #007AFF;
  --bg:      #ffffff;
  --bubble:  #f2f2f7;
  --text:    #1c1c1e;
  --muted:   #8e8e93;
  --border:  #e5e5ea;
  --red:     #ff3b30;
  --font:    -apple-system,'SF Pro Text',system-ui,BlinkMacSystemFont,sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
html { height:100%; height:100dvh }
body { font-family:var(--font); background:var(--bg); color:var(--text); height:100%; height:100dvh; display:flex; flex-direction:column; overflow:hidden }

/* ── Header ─────────────────────────────── */
#header {
  height:44px; flex-shrink:0; z-index:10;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
#h-phi  { font-size:20px; font-weight:300; color:var(--text); user-select:none }
#h-name { font-size:15px; font-weight:600; color:var(--text) }
#h-g    { font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; min-width:48px; text-align:right }

/* ── Chat ───────────────────────────────── */
#chat {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:12px 16px 4px; display:flex; flex-direction:column;
  -webkit-overflow-scrolling:touch;
}
.mw { display:flex; flex-direction:column; margin-bottom:8px }
.mw.u { align-items:flex-end }
.mw.e { align-items:flex-start }

.b {
  padding:10px 14px; font-size:16px; line-height:1.45;
  word-break:break-word; white-space:pre-wrap;
}
.u .b {
  background:var(--blue); color:#fff;
  border-radius:18px 18px 4px 18px;
  max-width:min(75%, 480px);
}
.e .b {
  background:var(--bubble); color:var(--text);
  border-radius:18px 18px 18px 4px;
  max-width:min(85%, 560px);
}
.meta {
  font-size:11px; color:var(--muted);
  margin-top:3px; padding:0 4px;
  font-variant-numeric:tabular-nums;
}

/* typing dots */
.dots { display:flex; align-items:center; gap:5px; padding:14px 18px }
.dot  { width:7px; height:7px; border-radius:50%; background:var(--muted); animation:bop 1.2s ease-in-out infinite }
.dot:nth-child(2) { animation-delay:.2s }
.dot:nth-child(3) { animation-delay:.4s }
@keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* ── Input area ─────────────────────────── */
#ibar {
  flex-shrink:0; border-top:1px solid var(--border); background:var(--bg);
  padding:8px 12px calc(8px + env(safe-area-inset-bottom));
  display:flex; align-items:flex-end; gap:8px;
}
#inp {
  flex:1; background:var(--bubble); border:none; border-radius:20px;
  padding:9px 14px; font-size:16px; font-family:var(--font); color:var(--text);
  resize:none; outline:none; max-height:120px; line-height:1.4; overflow-y:auto;
}
#inp::placeholder { color:var(--muted) }
#snd {
  width:34px; height:34px; flex-shrink:0; border-radius:50%;
  background:var(--blue); color:#fff; border:none; font-size:17px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
  opacity:0; pointer-events:none; transition:opacity .15s,transform .1s;
}
#snd.on          { opacity:1; pointer-events:auto }
#snd:disabled    { background:var(--muted) }
#snd:active      { transform:scale(.9) }
#errtxt          { font-size:12px; color:var(--red); padding:0 16px 6px; display:none }

/* ── Name modal ─────────────────────────── */
#modal {
  position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.28); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center;
}
#modal.gone { display:none }
.card {
  background:#fff; border-radius:18px;
  padding:32px 24px 24px; width:min(340px,calc(100vw - 32px));
  box-shadow:0 8px 40px rgba(0,0,0,.14);
}
.card h2 { font-size:20px; font-weight:600; margin-bottom:6px }
.card p  { font-size:14px; color:var(--muted); margin-bottom:22px; line-height:1.4 }
#ni {
  width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:11px;
  font-size:16px; font-family:var(--font); color:var(--text);
  outline:none; margin-bottom:14px; transition:border-color .15s;
}
#ni:focus { border-color:var(--blue) }
#ns {
  width:100%; padding:13px; background:var(--blue); color:#fff;
  border:none; border-radius:11px; font-size:16px; font-weight:600;
  font-family:var(--font); cursor:pointer;
}
#ns:active { opacity:.85 }

/* ── Status sheet ───────────────────────── */
#swrap             { position:fixed; inset:0; z-index:50; display:none }
#swrap.open        { display:block }
#sbg               { position:absolute; inset:0; background:rgba(0,0,0,.2) }
#spanel {
  position:absolute; bottom:0; left:0; right:0;
  background:#fff; border-radius:20px 20px 0 0;
  padding:0 24px calc(28px + env(safe-area-inset-bottom));
  transform:translateY(100%); transition:transform .3s cubic-bezier(.32,.72,0,1);
}
#swrap.open #spanel { transform:translateY(0) }
.handle { width:36px; height:4px; background:#d1d1d6; border-radius:2px; margin:12px auto 20px }
.shead  { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px }
.shead h3 { font-size:17px; font-weight:600 }
#scls { background:none; border:none; font-size:24px; color:var(--muted); cursor:pointer; padding:2px 4px; line-height:1 }
.srow   { margin-bottom:16px }
.slabel { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-bottom:5px }
.sval   { font-size:16px; line-height:1.6 }
.tag    {
  display:inline-block; background:var(--bubble); border-radius:7px;
  padding:3px 9px; font-size:13px; color:#3a3a3c;
  margin:2px 3px 2px 0; max-width:100%;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; vertical-align:middle;
}
</style>
</head>
<body>

<div id="modal">
  <div class="card">
    <h2>What's your name?</h2>
    <p>Used to track your understanding across sessions.</p>
    <input id="ni" type="text" placeholder="Your name" autocomplete="off" autofocus>
    <button id="ns">Start</button>
  </div>
</div>

<div id="swrap">
  <div id="sbg"></div>
  <div id="spanel">
    <div class="handle"></div>
    <div class="shead"><h3>Session</h3><button id="scls">×</button></div>
    <div id="sbody"></div>
  </div>
</div>

<div id="header">
  <span id="h-phi">φ</span>
  <span id="h-name"></span>
  <span id="h-g">G —</span>
</div>

<div id="chat"></div>
<div id="errtxt"></div>

<div id="ibar">
  <textarea id="inp" rows="1" placeholder="Ask anything…"></textarea>
  <button id="snd" aria-label="Send">↑</button>
</div>

<script>
const ENC = 'https://thecodecapo--physics-companion-serve-physicscompanion-ap-49c5ae.modal.run';
const STA = 'https://thecodecapo--physics-companion-serve-physicscompanion-ap-58c1c4.modal.run';

const G = id => document.getElementById(id);
const chat=G('chat'), inp=G('inp'), snd=G('snd'), err=G('errtxt');

let who = localStorage.getItem('phys_student') || '';
let busy = false;

// ── Bootstrap ─────────────────────────────────────────────────────────────────
function boot() {
  if (who) { G('modal').classList.add('gone'); G('h-name').textContent = who; }
}

function startSession() {
  const v = G('ni').value.trim();
  if (!v) return;
  who = v;
  localStorage.setItem('phys_student', v);
  G('modal').classList.add('gone');
  G('h-name').textContent = v;
  inp.focus();
}
G('ns').onclick = startSession;
G('ni').onkeydown = e => { if (e.key === 'Enter') startSession(); };

// ── Bubble helpers ─────────────────────────────────────────────────────────────
function x(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function bubble(role, text, meta) {
  const w = document.createElement('div');
  w.className = 'mw ' + role;
  w.innerHTML = `<div class="b">${x(text)}</div>${meta ? `<div class="meta">${x(meta)}</div>` : ''}`;
  chat.appendChild(w);
  return w;
}

function typing() {
  const w = document.createElement('div');
  w.className = 'mw e';
  w.innerHTML = '<div class="b dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(w);
  scroll();
  return w;
}

function scroll() { chat.scrollTo({top:chat.scrollHeight, behavior:'smooth'}); }

function showErr(msg) {
  err.textContent = msg; err.style.display = 'block';
  setTimeout(() => err.style.display = 'none', 4000);
}

// ── Input ─────────────────────────────────────────────────────────────────────
inp.oninput = () => {
  inp.style.height = 'auto';
  inp.style.height = inp.scrollHeight + 'px';
  snd.classList.toggle('on', inp.value.trim().length > 0);
};

async function send() {
  const txt = inp.value.trim();
  if (!txt || busy || !who) return;

  inp.value = ''; inp.style.height = 'auto'; snd.classList.remove('on');
  err.style.display = 'none';

  if (txt === '/status') { return openStatus(); }

  bubble('u', txt);
  scroll();
  const dot = typing();
  busy = true; snd.disabled = true;

  try {
    const r = await fetch(ENC, {
      method:'POST', mode:'cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({student_id:who, user_input:txt})
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    dot.remove();
    if (d.error) { showErr(d.error); return; }
    const gv  = d.G_after != null ? Number(d.G_after).toFixed(4) : '—';
    const enc = d.encounter_count ?? '—';
    bubble('e', d.response || '(no response)', `G=${gv} · ${d.bucket||'—'} · enc ${enc}`);
    G('h-g').textContent = 'G ' + gv;
    scroll();
  } catch {
    dot.remove(); showErr('Something went wrong. Try again.');
  } finally {
    busy = false; snd.disabled = false; inp.focus();
  }
}

snd.onclick = send;
inp.onkeydown = e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

// ── Status sheet ──────────────────────────────────────────────────────────────
async function openStatus() {
  const body = G('sbody');
  body.innerHTML = '<div class="sval" style="color:var(--muted)">Loading…</div>';
  G('swrap').classList.add('open');

  try {
    const r = await fetch(`${STA}?student_id=${encodeURIComponent(who)}`, {mode:'cors'});
    if (!r.ok) throw new Error();
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    const gv  = d.G != null ? Number(d.G).toFixed(4) : '—';
    const enc = d.encounter_count ?? '—';

    function tags(arr, none) {
      if (!arr?.length) return `<span style="color:var(--muted)">${none}</span>`;
      return arr.map(t => `<span class="tag" title="${x(t)}">${x(t.length>52 ? t.slice(0,52)+'…' : t)}</span>`).join('');
    }

    body.innerHTML = `
      <div class="srow"><div class="slabel">G</div><div class="sval">${gv}</div></div>
      <div class="srow"><div class="slabel">Encounters</div><div class="sval">${enc}</div></div>
      <div class="srow"><div class="slabel">Settled (K)</div><div class="sval">${tags(d.K_territory,'none yet')}</div></div>
      <div class="srow"><div class="slabel">Frontier (U)</div><div class="sval">${tags(d.U_territory,'none yet')}</div></div>
      <div class="srow"><div class="slabel">Unknown (N)</div><div class="sval">${tags(d.N_territory,'none yet')}</div></div>
    `;
  } catch {
    body.innerHTML = '<div class="sval" style="color:var(--red)">Could not load session data.</div>';
  }
}

function closeStatus() { G('swrap').classList.remove('open'); }
G('scls').onclick = closeStatus;
G('sbg').onclick  = closeStatus;
document.onkeydown = e => { if (e.key === 'Escape') closeStatus(); };

boot();
</script>
</body>
</html>
